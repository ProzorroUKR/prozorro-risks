include:
  - project: 'Web-Projects/pipeline-scripts'
    ref: master
    file: '/templates/security.yml'

variables:
  IMAGE_TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  IMAGE: $CI_REGISTRY_IMAGE:$IMAGE_TAG
  IMAGE_TEST: $CI_REGISTRY_IMAGE:$IMAGE_TAG-test
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/prozorro-risks-frontend:$IMAGE_TAG
  SEC_CS_IMAGE: $IMAGE
  SEC_CS_DOCKERFILE_PATH: Dockerfile
  DEFECTDOJO_PRODUCT_TYPE: "CDB"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master" && $BUILT_AS_BRIDGE == null
      when: never
    - if: $CI_COMMIT_BRANCH && $BUILT_AS_BRIDGE
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - lint
  - build
  - security
  - test
  - publish
  - deploy
  - cleanup

code-style-check:
  image: python:3.10-alpine3.19
  stage: lint
  tags:
    - kube-dev
  before_script:
    - pip install flake8
  script:
    - flake8
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - "**/*.py"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.py"

build-new-image:
  stage: build
  tags:
    - shell
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - make docker-build
    - docker push $IMAGE
    - docker push $IMAGE_TEST
    - docker push $IMAGE_FRONTEND
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  image: docker-registry.prozorro.gov.ua/docker/images/python:3.9-alpine3.14
  stage: test
  services:
    - name: bitnamilegacy/mongodb:6.0.13-debian-11-r9
      alias: mongo
  variables:
    MONGODB_URL: mongodb://root:example@mongo:27017/?replicaSet=rs0
    MONGODB_ROOT_PASSWORD: example
    MONGODB_REPLICA_SET_MODE: primary
    MONGODB_REPLICA_SET_NAME: rs0
    MONGODB_REPLICA_SET_KEY: replicaSetKey
  tags:
    - kube-dev
  before_script:
    - apk --no-cache add gcc build-base git openssl-dev libffi-dev
    - pip install -r requirements.txt
    - pip install -r tests/requirements.txt
    - pip install -e .
    - cp -r swagger /swagger
  script:
    - pytest -x -s tests/integration/
      --cov=src/prozorro/risks
      --cov-report xml
      --cov-report term
  artifacts:
    reports:
      coverage_report:
        path: coverage.xml
        coverage_format: cobertura
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

push-latest-image:
  stage: publish
  tags:
    - shell
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker tag $IMAGE $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker tag $IMAGE_FRONTEND $CI_REGISTRY_IMAGE/prozorro-risks-frontend:latest
    - docker push $CI_REGISTRY_IMAGE/prozorro-risks-frontend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

push-tagged-image:
  stage: publish
  tags:
    - shell
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker tag $IMAGE $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker tag $IMAGE_FRONTEND $CI_REGISTRY_IMAGE/prozorro-risks-frontend:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE/prozorro-risks-frontend:$CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG

review:
  stage: deploy
  tags:
    - shell
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    action: start
    url: http://api.${CI_COMMIT_REF_SLUG}.${K8S_DOMAIN}/api/ping
    on_stop: stop_review
    auto_stop_in: 1 month
  variables:
    TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    RELEASE: risks-${CI_COMMIT_REF_SLUG}
  script:
    - helm3 upgrade -i ${RELEASE} helm/prozorro-risks --namespace dev-prozorro
        --set prozorro-risks.api.image.tag=$TAG
        --set prozorro-risks.tenders-crawler.image.tag=$TAG
        --set prozorro-risks.contracts-crawler.image.tag=$TAG
        --set prozorro-risks.delay-crawler.image.tag=$TAG
        --set "ingress.hosts[0].host=risks.${RELEASE}.k8s.prozorro.gov.ua,ingress.hosts[0].paths[0].path=/api,ingress.hosts[0].paths[0].service=api,ingress.hosts[0].paths[1].path=/,ingress.hosts[0].paths[1].service=frontend,ingress.hosts[0].paths[0].pathType=ImplementationSpecific,ingress.hosts[0].paths[1].pathType=ImplementationSpecific"
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

stop_review:
  stage: deploy
  script:
    - helm3 delete risks-$CI_COMMIT_REF_SLUG --namespace dev-prozorro
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    action: stop
  tags:
    - shell
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "master"
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

deploy:
  stage: deploy
  tags:
    - shell
  variables:
    TAG: latest
    RELEASE: risks-master
  script:
    - helm3 upgrade -i ${RELEASE} helm/prozorro-risks --namespace dev-prozorro
  after_script:
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-api
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-frontend
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-contracts-crawler
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-tenders-crawler
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-delay-crawler
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

cleanup-test-images:
  stage: cleanup
  tags:
    - shell
  script:
    - make remove-compose
    - docker rmi --no-prune -f $IMAGE || true
    - docker rmi --no-prune -f $IMAGE_TEST || true
    - docker rmi --no-prune -f $IMAGE_FRONTEND || true
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
  when: always
