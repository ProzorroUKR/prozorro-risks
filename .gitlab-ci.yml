include:
  - project: 'Web-Projects/pipeline-scripts'
    ref: master
    file: '/templates/security.yml'

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID || $CI_MERGE_REQUEST_EVENT_TYPE
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - lint
  - build
  - test
  - publish
  - security
  - deploy
  - cleanup

image: docker-registry.prozorro.gov.ua/cdb/openprocurement.api/ci

variables:
  TAG: $CI_PIPELINE_ID-$CI_COMMIT_SHORT_SHA
  TAG_TEST: $TAG-test
  TAG_FRONTEND: $TAG-frontend
  CI_REGISTRY_FRONTEND_IMAGE_SUFFIX: 'prozorro-risks-frontend'
  IMAGE: $CI_REGISTRY_IMAGE:$TAG
  IMAGE_TEST: $CI_REGISTRY_IMAGE:$TAG_TEST
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:$TAG_FRONTEND
  SEC_CS_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  SEC_CS_DOCKERFILE_PATH: Dockerfile
  DEFECTDOJO_PRODUCT_TYPE: "CDB"

container_scanning:
  needs:
    - job: push-tagged-image

code-style-check:
  image: python:3.13-alpine
  stage: lint
  tags:
    - kube-dev
  before_script:
    - pip install flake8
  script:
    - flake8
  only:
    changes:
      - "**/*.py"
  except:
    - schedules

build-new-image:
  stage: build
  tags:
    - shell
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - make docker-build
    - docker push $CI_REGISTRY_IMAGE:$TAG
    - docker push $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:$TAG_FRONTEND

test:
  image: python:3.13-alpine
  stage: test
  services:
    - name: bitnamilegacy/mongodb:6.0.13-debian-11-r9
      alias: mongo
  variables:
    MONGODB_URL: mongodb://root:example@mongo:27017/?replicaSet=rs0
    MONGODB_ROOT_PASSWORD: example
    MONGODB_REPLICA_SET_MODE: primary
    MONGODB_REPLICA_SET_NAME: rs0
    MONGODB_REPLICA_SET_KEY: replicaSetKey
  tags:
    - kube-dev
  before_script:
    - apk --no-cache add gcc build-base git openssl-dev libffi-dev
    - pip install -r requirements.txt
    - pip install -r tests/requirements.txt
    - pip install -e .
    - cp -r swagger /swagger
  script:
    - pytest -x -s tests/integration/
      --cov=src/prozorro/risks
      --cov-report xml
      --cov-report term
  artifacts:
    reports:
      coverage_report:
        path: coverage.xml
        coverage_format: cobertura
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'

push-latest-image:
  stage: publish
  tags:
    - shell
  needs:
    - job: build-new-image
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker tag $IMAGE $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker tag $IMAGE_FRONTEND $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:latest
    - docker push $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:latest
  only:
    - master

push-tagged-image:
  stage: publish
  tags:
    - shell
  needs:
    - job: build-new-image
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker tag $IMAGE $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    - docker tag $IMAGE_FRONTEND $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:$CI_COMMIT_REF_SLUG
    - docker push $CI_REGISTRY_IMAGE/$CI_REGISTRY_FRONTEND_IMAGE_SUFFIX:$CI_COMMIT_REF_SLUG
  only:
    - tags

review:
  stage: deploy
  tags:
    - shell
  needs:
    - job: build-new-image
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    action: start
    url: http://risks.${RELEASE}.k8s.prozorro.gov.ua
    on_stop: stop_review
    auto_stop_in: 1 month
  variables:
    RELEASE: risks-${CI_COMMIT_REF_SLUG}
  script:
    - helm3 upgrade -i ${RELEASE} helm/prozorro-risks --namespace dev-prozorro
        --set api.image.tag=$TAG
        --set tenders_crawler.image.tag=$TAG
        --set contracts_crawler.image.tag=$TAG
        --set delay_crawler.image.tag=$TAG
        --set frontend.image.tag=$TAG_FRONTEND
        --set "ingress.hosts[0].host=risks.${RELEASE}.k8s.prozorro.gov.ua,ingress.hosts[0].paths[0].path=/api,ingress.hosts[0].paths[0].service=api,ingress.hosts[0].paths[1].path=/,ingress.hosts[0].paths[1].service=frontend,ingress.hosts[0].paths[0].pathType=ImplementationSpecific,ingress.hosts[0].paths[1].pathType=ImplementationSpecific"
  when: manual
  only:
    - branches
  except:
    - master
    - schedules

stop_review:
  stage: deploy
  script:
    - helm3 delete risks-$CI_COMMIT_REF_SLUG --namespace dev-prozorro
  environment:
    name: review/${CI_COMMIT_REF_SLUG}
    action: stop
  tags:
    - shell
  when: manual
  only:
    - branches
  except:
    - master
    - schedules

deploy:
  stage: deploy
  tags:
    - shell
  variables:
    TAG: latest
    RELEASE: risks-master
  script:
    - helm3 upgrade -i ${RELEASE} helm/prozorro-risks --namespace dev-prozorro
  after_script:
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-api
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-frontend
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-contracts-crawler
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-tenders-crawler
    - kubectl --namespace dev-prozorro rollout restart deployment risks-master-prozorro-risks-delay-crawler
  only:
    - master
  except:
    - schedules

cleanup-test-images:
  stage: cleanup
  tags:
    - shell
  script:
    - make remove-compose
    - docker rmi --no-prune -f $IMAGE || true
    - docker rmi --no-prune -f $IMAGE_TEST || true
    - docker rmi --no-prune -f $IMAGE_FRONTEND || true
    - docker network rm ${CI_COMMIT_SHORT_SHA}_default || true
  when: always
